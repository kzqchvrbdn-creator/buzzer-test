<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Joueur | Jeu buzzer</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="player-stage">
        <header class="topbar">
          <div class="brand">
            <div class="mark">BZ</div>
            <div>
              <h1>Buzzer joueur</h1>
              <p class="subtitle" id="playerNameLabel">Entre ton prénom pour rejoindre la partie.</p>
            </div>
          </div>
          <div class="pill">
            <span id="statusDot" class="status-dot"></span>
            <span id="roundLabel">Manche 1</span>
            <span data-connection>En direct</span>
          </div>
        </header>

        <div>
          <form class="join-form" id="joinForm">
            <input id="nameInput" autocomplete="name" maxlength="32" placeholder="Ton prénom" required />
            <button class="button blue" type="submit">Rejoindre</button>
          </form>

          <div class="buzzer-area">
            <button id="buzzer" class="buzzer" disabled>Buzz</button>
          </div>

          <div id="message" class="player-message">En attente du lancement par l'admin.</div>
        </div>

        <footer id="miniScoreboard" class="mini-scoreboard"></footer>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
    <script type="module" src="/player.js"></script>
  </body>
</html>
